<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SHAMWARI — Cinematic Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{
  --pink:#ff2dd1;
  --blue:#00d4ff;
  --gold:#ffb347;
  --bg:#050507;
}
*{box-sizing:border-box}
html,body{
  margin:0;padding:0;height:100%;overflow:hidden;background:#000;color:#fff;
  font-family:'Outfit',system-ui,-apple-system,Inter, sans-serif;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
#loader{
  position:fixed;inset:0;z-index:200;background:radial-gradient(1200px 800px at 50% 50%,#0a0a12 0%,#000 70%);
  display:grid;place-items:center;
}
.loader-inner{text-align:center}
.loader-logo{
  font-weight:200;letter-spacing:.52em;text-transform:uppercase;font-size:clamp(22px,5vw,38px);
  background:linear-gradient(90deg,var(--pink),var(--blue),var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 18px rgba(0,212,255,.25));
}
.loader-bar{width:min(62vw,280px);height:2px;background:rgba(255,255,255,.08);margin:26px auto 10px;border-radius:2px;overflow:hidden;position:relative}
.loader-progress{height:100%;width:0%;background:linear-gradient(90deg,var(--pink),var(--blue));box-shadow:0 0 20px rgba(0,212,255,.6),0 0 20px rgba(255,45,209,.4)}
.loader-pct{font-family:Inter;font-weight:300;letter-spacing:.3em;font-size:11px;color:rgba(255,255,255,.65)}

#app{position:relative;width:100vw;height:100vh;overflow:hidden;background:#000}
.stage{position:absolute;inset:0;overflow:hidden}
.scene{position:absolute;inset:-2%;opacity:0;visibility:hidden;will-change:opacity,transform}
.scene .bg{position:absolute;inset:-5%;width:110%;height:110%;object-fit:cover;transform:translateZ(0);will-change:transform,filter}
.bg-wrap{position:absolute;inset:0}
.bg-wrap .bg{inset:0;width:100%;height:100%}
.particles{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

.text-wrap{position:absolute;inset:0;display:grid;place-items:center;z-index:12}
.text-wrap h2{
  margin:0;padding:12px 24px;font-weight:200;text-transform:uppercase;letter-spacing:.42em;
  font-size:clamp(13px,2.6vw,26px);color:#fff;background:rgba(5,5,8,.28);
  border:1px solid rgba(255,255,255,.12);border-radius:999px;backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);box-shadow:inset 0 0 30px rgba(255,255,255,.04),0 0 30px rgba(0,212,255,.15);
  opacity:0;transform:translateY(8px);text-shadow:0 0 24px rgba(0,212,255,.35);
}
.text-wrap h2.brand{
  background:none;border:none;backdrop-filter:none;box-shadow:none;padding:0;
  font-weight:500;font-size:clamp(36px,9vw,96px);letter-spacing:.18em;text-transform:none;
  background:linear-gradient(90deg,var(--pink),var(--blue),var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 40px rgba(255,45,209,.25),0 0 60px rgba(0,212,255,.2);
}

.glow{position:absolute;inset:-20%;mix-blend-mode:screen;pointer-events:none;opacity:.7}
.glow.gold{background:radial-gradient(50% 50% at 50% 50%,rgba(255,179,71,.35) 0%,transparent 60%)}
.shield-glow{position:absolute;left:50%;top:50%;width:70vmin;height:70vmin;transform:translate(-50%,-50%);mix-blend-mode:screen;
  background:radial-gradient(circle,rgba(0,212,255,.35) 0%,rgba(0,212,255,.15) 30%,transparent 65%);filter:blur(10px);opacity:.9}

.scan{position:absolute;left:0;top:-10%;width:100%;height:3px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.9),transparent);
  box-shadow:0 0 18px var(--blue),0 0 40px var(--blue);mix-blend-mode:screen;z-index:5}
.circuit-lines{position:absolute;inset:0;mix-blend-mode:screen;opacity:.6;
  background:
    repeating-linear-gradient(90deg,rgba(0,212,255,.08) 0 2px,transparent 2px 120px),
    repeating-linear-gradient(0deg,rgba(255,45,209,.06) 0 1px,transparent 1px 80px);
  animation:circuitMove 3s linear infinite}
@keyframes circuitMove{to{background-position:240px 0,0 160px}}

.hud{position:absolute;left:50%;top:50%;width:min(68vmin,520px);height:min(68vmin,520px);transform:translate(-50%,-50%);z-index:6;opacity:.9;mix-blend-mode:screen}

#scene4 .ca-r,#scene4 .ca-b{position:absolute;inset:0;opacity:0;mix-blend-mode:screen}
#scene4 .ca-r{filter:hue-rotate(300deg) saturate(1.4) brightness(1.15)}
#scene4 .ca-b{filter:hue-rotate(180deg) saturate(1.3) brightness(1.1)}

#finale{display:grid;place-items:center;background:#000}
.blackout{position:absolute;inset:0;background:#000;z-index:2}
.logo-wrap{position:relative;z-index:4;display:grid;place-items:center}
.logo{width:min(56vw,380px);height:auto;display:block;border-radius:28px;
  filter:drop-shadow(0 0 28px rgba(0,212,255,.28)) drop-shadow(0 0 42px rgba(255,45,209,.22));
  transform:translateZ(0)}
.logo-glow{position:absolute;left:50%;top:50%;width:min(80vmin,560px);height:min(80vmin,560px);transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(255,45,209,.28) 0%,rgba(0,212,255,.22) 35%,transparent 68%);
  filter:blur(38px);mix-blend-mode:screen;opacity:0;border-radius:50%}
.tagline{position:absolute;bottom:16%;left:50%;transform:translateX(-50%) translateY(10px);z-index:5;
  font-family:Inter;font-weight:300;letter-spacing:.38em;text-transform:uppercase;font-size:clamp(10px,2.2vw,13px);
  color:rgba(255,255,255,.72);opacity:0;white-space:nowrap}

.vignette{position:absolute;inset:-10%;z-index:20;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,.55) 78%,rgba(0,0,0,.9) 100%);mix-blend-mode:multiply}
.grain{position:absolute;inset:-50%;z-index:21;pointer-events:none;opacity:.07;mix-blend-mode:screen;
  background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPSczMDAnIGhlaWdodD0nMzAwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPSc0JyBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+PGZlQ29sb3JNYXRyaXggdHlwZT0nc2F0dXJhdGUnIHZhbHVlcz0nMCcvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSczMDAnIGhlaWdodD0nMzAwJyBmaWx0ZXI9InVybCgjbikiLz48L3N2Zz4=");background-size:280px 280px;animation:grainShift .45s steps(2) infinite}
@keyframes grainShift{0%{transform:translate(0,0)}100%{transform:translate(-10%,5%)}}
.light-leak{position:absolute;top:-40%;left:-25%;width:70%;height:180%;z-index:19;pointer-events:none;mix-blend-mode:screen;opacity:0;
  transform:rotate(24deg);filter:blur(46px);background:radial-gradient(40% 35% at 30% 40%,rgba(255,45,209,.28),transparent 60%),radial-gradient(35% 30% at 70% 60%,rgba(0,212,255,.24),transparent 60%)}

.letterbox{position:absolute;left:0;width:100%;height:7.5vh;background:#000;z-index:50;pointer-events:none}
.letterbox.top{top:0}
.letterbox.bottom{bottom:0}
@media (max-width:768px){.letterbox{height:6vh}}

.controls{position:absolute;top:calc(7.5vh + 14px);right:16px;z-index:60;display:flex;gap:10px}
@media (max-width:768px){.controls{top:calc(6vh + 10px);right:12px}}
.btn{
  appearance:none;border:1px solid rgba(255,255,255,.16);background:rgba(10,10,14,.55);color:#fff;
  padding:9px 14px;border-radius:999px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  font-family:Inter;font-weight:400;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  cursor:pointer;transition:.25s;box-shadow:inset 0 0 12px rgba(255,255,255,.04)
}
.btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.28)}
#replay{opacity:0;pointer-events:none}

.wave.active{filter:url(#waveFilter)}

@media (max-width:600px){
  .text-wrap h2{letter-spacing:.28em;padding:10px 16px;font-size:12px}
}
</style>
</head>

<svg width="0" height="0" style="position:absolute">
  <filter id="waveFilter">
    <feTurbulence type="fractalNoise" baseFrequency="0.008 0.03" numOctaves="2" seed="2" result="noise">
      <animate attributeName="baseFrequency" dur="6s" values="0.008 0.03;0.013 0.05;0.008 0.03" repeatCount="indefinite"/>
    </feTurbulence>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G">
      <animate attributeName="scale" dur="1.8" values="0;28;0" begin="indefinite" fill="freeze" id="waveAnim"/>
    </feDisplacementMap>
  </filter>

<script>
(() => {
  const loader = document.getElementById('loader');
  const progressBar = document.querySelector('.loader-progress');
  const pct = document.querySelector('.loader-pct');
  const imgs = document.querySelectorAll('#preloader-assets img');
  let loaded = 0;

  function updateLoad(){
    loaded++;
    const p = Math.round((loaded/imgs.length)*100);
    progressBar.style.width = p+'%';
    pct.textContent = p+'%';
    if(loaded===imgs.length){
      gsap.to(loader,{autoAlpha:0,duration:0.8,ease:'power2.out',delay:0.2,onComplete:()=>loader.remove()});
      setTimeout(initCinematic, 300);
    }
  }
  imgs.forEach(img=>{
    if(img.complete) updateLoad();
    else { img.addEventListener('load',updateLoad); img.addEventListener('error',updateLoad); }
  });

  // Sound toggle - ambient drone
  const soundBtn = document.getElementById('soundToggle');
  let audioCtx, masterGain, playing=false;
  soundBtn.addEventListener('click',async()=>{
    if(!audioCtx){
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      masterGain = audioCtx.createGain(); masterGain.gain.value=0; masterGain.connect(audioCtx.destination);
      const o1 = audioCtx.createOscillator(); o1.type='sine'; o1.frequency.value=54;
      const o2 = audioCtx.createOscillator(); o2.type='triangle'; o2.frequency.value=108.5; o2.detune.value=-7;
      const filt = audioCtx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=620; filt.Q.value=0.7;
      const lfo = audioCtx.createOscillator(); lfo.frequency.value=0.07; const lfoG = audioCtx.createGain(); lfoG.gain.value=180;
      lfo.connect(lfoG); lfoG.connect(filt.frequency); lfo.start();
      o1.connect(filt); o2.connect(filt); filt.connect(masterGain); o1.start(); o2.start();
    }
    playing = !playing;
    gsap.to(masterGain.gain,{value:playing?0.035:0,duration:1.2,ease:'power2.inOut'});
    soundBtn.textContent = playing?'Sound On':'Sound';
    soundBtn.setAttribute('aria-pressed', playing);
    if(audioCtx.state==='suspended') audioCtx.resume();
  });

  function initCinematic(){
    const tl = gsap.timeline({defaults:{ease:'power2.inOut'}});
    const replayBtn = document.getElementById('replay');
    const lightLeak = document.querySelector('.light-leak');

    // particle system scene1
    let stopP1=null;
    function startP1(){
      const c=document.getElementById('p1'); const ctx=c.getContext('2d'); let w,h,parts=[],running=true;
      function resize(){ w=c.width=innerWidth; h=c.height=innerHeight; const count=innerWidth<768?38:66;
        parts=Array.from({length:count},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*0.35,vy:(Math.random()-.5)*0.35}))}
      resize(); window.addEventListener('resize',resize);
      function draw(){
        if(!running) return;
        ctx.clearRect(0,0,w,h);
        parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1});
        for(let i=0;i<parts.length;i++){for(let j=i+1;j<parts.length;j++){
          const a=parts[i],b=parts[j],d=Math.hypot(a.x-b.x,a.y-b.y);
          if(d<115){ctx.strokeStyle=`rgba(255,179,71,${1-d/115})`;ctx.lineWidth=0.6;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
        }}
        parts.forEach(p=>{ctx.fillStyle='rgba(255,179,71,0.9)';ctx.beginPath();ctx.arc(p.x,p.y,1.4,0,Math.PI*2);ctx.fill()});
        requestAnimationFrame(draw)
      }
      draw();
      return ()=>{running=false;ctx.clearRect(0,0,w,h);window.removeEventListener('resize',resize)}
    }
    function convergeP5(){
      const c=document.getElementById('p5'); const ctx=c.getContext('2d'); let w=c.width=innerWidth,h=c.height=innerHeight;
      const parts=Array.from({length:90},()=>({x:Math.random()*w,y:Math.random()*h,sx:Math.random()*w,sy:Math.random()*h}));
      let t=0; function draw(){ ctx.clearRect(0,0,w,h); t=Math.min(t+0.016,1); const ease=1-Math.pow(1-t,3);
        parts.forEach(p=>{const x=p.sx+(w/2-p.sx)*ease; const y=p.sy+(h/2-p.sy)*ease;
          ctx.fillStyle=`rgba(190,110,255,${0.9*(1-ease*0.6)})`; ctx.beginPath(); ctx.arc(x,y,2.1,0,7); ctx.fill();
          ctx.fillStyle=`rgba(0,212,255,${0.7*(1-ease)})`; ctx.beginPath(); ctx.arc(x,y,1,0,7); ctx.fill();
        }); if(t<1) requestAnimationFrame(draw) else ctx.clearRect(0,0,w,h) }
      draw();
    }
    function finalSparks(){
      const c=document.getElementById('pFinal'); const ctx=c.getContext('2d'); c.width=innerWidth; c.height=innerHeight;
      const cx=innerWidth/2, cy=innerHeight/2 *0.98;
      const sparks=Array.from({length:140},()=>({x:cx,y:cy,a:Math.random()*Math.PI*2,s:2+Math.random()*4.5,l:0}));
      function draw(){ ctx.clearRect(0,0,c.width,c.height); let alive=false;
        sparks.forEach(s=>{ if(s.l<1){ alive=true; s.l+=0.018; s.x+=Math.cos(s.a)*s.s; s.y+=Math.sin(s.a)*s.s; s.s*=0.965;
          const o=1-s.l; ctx.fillStyle=`rgba(255,45,209,${o})`; ctx.beginPath(); ctx.arc(s.x,s.y,2.2,0,7); ctx.fill();
          ctx.fillStyle=`rgba(0,212,255,${o*0.9})`; ctx.beginPath(); ctx.arc(s.x-1.2,s.y+0.5,1.3,0,7); ctx.fill();
        }}); if(alive) requestAnimationFrame(draw) }
      draw();
    }

    // Timeline - 13 seconds
    tl.set(['.scene'],{autoAlpha:0})
    tl.set('#scene1',{autoAlpha:1})
    tl.add(()=>{stopP1=startP1()},0)
    tl.fromTo('#scene1 .bg',{scale:1.04},{scale:1.12,duration:2.5,ease:'power1.inOut'},0)
    tl.to('#scene1 h2',{autoAlpha:1,y:0,duration:0.8},0.4)
    tl.to('#scene1 h2',{autoAlpha:0,y:-14,duration:0.5},2.0)
    tl.to(lightLeak,{opacity:0.32,duration:0.6},0.2)
    tl.to(lightLeak,{opacity:0,duration:0.8},1.6)

    // Scene 2
    tl.set('#scene2',{autoAlpha:1},2.3)
    tl.fromTo('#scene2 .bg',{scale:1.12,opacity:0},{scale:1,opacity:1,duration:1.1,ease:'power2.out'},2.5)
    tl.fromTo('#scene2 .scan',{y:'-10vh'},{y:'110vh',duration:1.4,ease:'power2.inOut'},2.5)
    tl.to('#scene2 h2',{autoAlpha:1,duration:0.7},3.05)
    tl.to('#scene2 h2',{autoAlpha:0,duration:0.45},4.05)
    tl.to('#scene1',{autoAlpha:0,duration:0.4},2.9)
    tl.add(()=>{stopP1&&stopP1()},2.6)

    // Scene 3
    tl.set('#scene3',{autoAlpha:1},4.35)
    tl.fromTo('#scene3 .bg',{scale:0.82,filter:'brightness(0.7) saturate(0.9)'},{scale:1,filter:'brightness(1) saturate(1)',duration:1.7,ease:'power3.out'},4.5)
    tl.fromTo('#scene3 .hud',{rotation:-70,scale:0.85,opacity:0},{rotation:0,scale:1,opacity:1,duration:1.4,ease:'power2.out'},4.55)
    tl.to('#scene3 .shield-glow',{scale:1.08,opacity:0.95,repeat:1,yoyo:true,duration:0.75,ease:'sine.inOut'},4.9)
    tl.to('#scene3 h2',{autoAlpha:1,duration:0.6},5.1)
    tl.to('#scene3 h2',{autoAlpha:0,duration:0.45},6.05)
    tl.to('#scene2',{autoAlpha:0,duration:0.35},4.9)

    // Scene 4
    tl.set('#scene4',{autoAlpha:1},6.4)
    tl.fromTo('#scene4 .bg-wrap',{xPercent:-8,filter:'blur(18px) brightness(1.4)'},{xPercent:0,filter:'blur(0px) brightness(1)',duration:0.65,ease:'power4.out'},6.5)
    tl.to('#scene4 .ca-r',{x:4,opacity:0.65,duration:0.12},7.0)
    tl.to('#scene4 .ca-b',{x:-4,opacity:0.6,duration:0.12},7.0)
    tl.to(['#scene4 .ca-r','#scene4 .ca-b'],{x:0,opacity:0,duration:0.35,ease:'power2.out'},7.18)
    tl.to('#scene4 h2',{autoAlpha:1,duration:0.55},7.15)
    tl.to('#scene4 h2',{autoAlpha:0,duration:0.4},8.1)
    tl.to('#scene3',{autoAlpha:0,duration:0.3},6.8)
    tl.to(lightLeak,{opacity:0.38,duration:0.4},6.55)
    tl.to(lightLeak,{opacity:0,duration:0.7},7.2)

    // Scene 5
    tl.set('#scene5',{autoAlpha:1},8.35)
    tl.fromTo('#scene5 .bg',{scale:1.18,rotateZ:1.5},{scale:1,rotateZ:0,duration:1.7,ease:'power3.out'},8.5)
    tl.add(()=>{ document.querySelector('#scene5 .wave').classList.add('active'); document.getElementById('waveAnim').beginElement(); convergeP5(); },8.55)
    tl.fromTo('#scene5 h2',{autoAlpha:0,scale:0.92,letterSpacing:'0.6em'},{autoAlpha:1,scale:1,letterSpacing:'0.18em',duration:0.85,ease:'power2.out'},9.15)
    tl.to('#scene5 h2',{textShadow:'0 0 40px rgba(255,45,209,.5),0 0 70px rgba(0,212,255,.35)',duration:0.4},9.6)
    tl.to('#scene4',{autoAlpha:0,duration:0.4},8.9)

    // Finale
    tl.to('#scene5',{autoAlpha:0,duration:0.5,ease:'power2.in'},10.45)
    tl.set('#finale',{autoAlpha:1},10.6)
    tl.fromTo('#finale .blackout',{opacity:1},{opacity:0,duration:0.45},10.65)
    tl.fromTo('#finale .logo',{scale:0.86,opacity:0,filter:'blur(16px)'},{scale:1,opacity:1,filter:'blur(0px)',duration:0.85,ease:'power3.out'},11.0)
    tl.add(()=>finalSparks(),11.05)
    tl.to('#finale .logo',{x:-1.5,skewX:8,duration:0.05,repeat:6,yoyo:true,ease:'steps(1)'},11.55)
    tl.to('#finale .logo-glow',{opacity:0.9,duration:0.6},11.4)
    tl.to('#finale .logo-glow',{scale:1.06,repeat:-1,yoyo:true,duration:1.8,ease:'sine.inOut'},11.6)
    tl.to('.tagline',{autoAlpha:1,y:0,duration:0.8,ease:'power2.out'},12.0)
    tl.to(lightLeak,{opacity:0.25,duration:0.5},11.8)
    tl.to(lightLeak,{opacity:0,duration:1},12.5)

    tl.add(()=>{
      gsap.to(replayBtn,{autoAlpha:1,duration:0.5,onStart:()=>replayBtn.style.pointerEvents='auto'})
    },13)

    replayBtn.addEventListener('click',()=>{
      gsap.to(replayBtn,{autoAlpha:0,duration:0.3,onStart:()=>replayBtn.style.pointerEvents='none'});
      document.querySelector('#scene5 .wave').classList.remove('active');
      gsap.set(['#finale .logo-glow','.tagline'],{clearProps:'all'});
      tl.restart(true);
    });

    // Parallax subtle on mouse / tilt
    window.addEventListener('mousemove',e=>{
      const cx = (e.clientX/innerWidth -0.5)*2;
      const cy = (e.clientY/innerHeight-0.5)*2;
      gsap.to('.scene .bg',{x:cx*-12,y:cy*-10,duration:1.2,ease:'power2.out',overwrite:'auto'})
    },{passive:true})
  }
})();
</script>
</body>
</html>
